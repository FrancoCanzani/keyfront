# fly apps create api-gateway-gw   (change the name here if taken)
# fly secrets set -a api-gateway-gw REDIS_URL=... GATEWAY_SECRET=...
app = "api-gateway-gw"
primary_region = "eze"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  ADDR = ":8080"
  # the wildcard consumers call: {host_key}.gw.yourdomain.com — set your real domain
  GATEWAY_DOMAIN = "gw.example.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1
