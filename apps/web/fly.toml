# fly apps create api-gateway-web   (change the name here if taken)
# fly secrets set -a api-gateway-web DATABASE_URL=... REDIS_URL=... \
#   BETTER_AUTH_SECRET=... BETTER_AUTH_URL=https://app.yourdomain.com \
#   CF_ACCOUNT_ID=... CF_EMAIL_API_TOKEN=... EMAIL_FROM=...
app = "api-gateway-web"
primary_region = "eze"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # migrations + redis rebuild run inside fly's network with the real secrets
  release_command = "bun run release"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1
